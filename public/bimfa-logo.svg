<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cube top face -->
  <polygon points="100,10 175,52 100,94 25,52" fill="#1976d2"/>
  <!-- Cube left face -->
  <polygon points="25,52 100,94 100,170 25,128" fill="#0d47a1"/>
  <!-- Cube right face -->
  <polygon points="175,52 100,94 100,170 175,128" fill="#1565c0"/>
  <!-- B letter on left face -->
  <text x="52" y="145" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" transform="skewY(30) translate(0,-55)">B</text>
  <!-- F letter on right face -->
  <text x="118" y="145" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" transform="skewY(-30) translate(0,-5)">F</text>
</svg>
